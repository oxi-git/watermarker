<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Watermarker - Aggiungi filigrana ai tuoi documenti">
  <title>Watermarker</title>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── SIDEBAR ──────────────────────────────────────────── */
    #sidebar {
      width: 300px;
      min-width: 300px;
      background: #1a1a1a;
      border-right: 1px solid #2a2a2a;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    h1 { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }

    .section {
      background: #222;
      border-radius: 10px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 11px;
    }
    .section-title {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1px; color: #666;
    }

    /* Dropzone */
    #dropzone {
      border: 2px dashed #333;
      border-radius: 10px;
      padding: 22px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      color: #666;
    }
    #dropzone.compact { padding: 10px 16px; }
    #dropzone:hover, #dropzone.drag-over {
      border-color: #667eea;
      background: rgba(102,126,234,0.07);
      color: #aaa;
    }
    #dropzone p { font-size: 13px; line-height: 1.5; }
    #dropzone .hint { font-size: 11px; margin-top: 3px; color: #444; }
    #wmimg { display: none; }

    /* File list */
    #filelist-section { display: none; }
    #filelist { display: flex; flex-direction: column; gap: 4px; max-height: 260px; overflow-y: auto; }
    .file-item {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 6px; border-radius: 6px; cursor: pointer;
      transition: background 0.12s; border: 1px solid transparent;
    }
    .file-item:hover { background: #2a2a2a; }
    .file-item.selected { background: rgba(102,126,234,0.12); border-color: rgba(102,126,234,0.3); }
    .file-thumb { width: 34px; height: 34px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
    .file-info { flex: 1; overflow: hidden; }
    .file-name { font-size: 12px; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-size { font-size: 10px; color: #555; margin-top: 1px; }
    .file-remove { color: #444; font-size: 16px; line-height: 1; cursor: pointer; padding: 2px 4px; border-radius: 3px; flex-shrink: 0; }
    .file-remove:hover { color: #e55; background: rgba(255,80,80,0.1); }

    /* Form */
    label { font-size: 11px; color: #888; display: block; margin-bottom: 4px; }
    input[type="text"], select {
      width: 100%; background: #2a2a2a; border: 1px solid #333;
      border-radius: 6px; color: #e0e0e0; padding: 7px 9px;
      font-size: 13px; outline: none; transition: border-color 0.15s;
    }
    input[type="text"]:focus, select:focus { border-color: #667eea; }
    .range-row { display: flex; align-items: center; gap: 8px; }
    input[type="range"] { flex: 1; accent-color: #667eea; cursor: pointer; height: 4px; }
    .range-val { font-size: 11px; color: #aaa; min-width: 40px; text-align: right; font-variant-numeric: tabular-nums; }
    input[type="color"] { width: 36px; height: 28px; border: 1px solid #333; border-radius: 6px; cursor: pointer; background: none; padding: 2px; }
    .color-row { display: flex; align-items: center; gap: 8px; }
    .color-label { font-size: 12px; color: #777; }

    /* Buttons */
    .btn { padding: 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; width: 100%; text-align: center; }
    .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
    .btn-primary:hover:not(:disabled) { opacity: 0.88; }
    .btn-secondary { background: #2a2a2a; color: #ccc; border: 1px solid #333; }
    .btn-secondary:hover:not(:disabled) { background: #333; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-row { display: flex; gap: 8px; }
    .btn-row .btn { flex: 1; }

    /* ZIP progress */
    #zip-progress { display: none; }
    #zip-bar-wrap { background: #2a2a2a; border-radius: 4px; height: 4px; overflow: hidden; }
    #zip-bar { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); width: 0%; transition: width 0.15s; }
    #zip-label { font-size: 11px; color: #777; margin-top: 5px; text-align: center; }

    /* ─── MAIN PANEL ───────────────────────────────────────── */
    #mainpanel {
      flex: 1; overflow: hidden; background: #181818;
      display: flex; flex-direction: column;
      position: relative;
    }

    /* Placeholder */
    #placeholder {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #333; user-select: none;
    }
    #placeholder svg { margin-bottom: 12px; }
    #placeholder p { font-size: 15px; }

    /* Grid view */
    #grid-view {
      flex: 1; overflow-y: auto; display: none; padding: 20px;
    }
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .grid-cell {
      position: relative; cursor: pointer; border-radius: 8px;
      overflow: hidden; background: #111;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .grid-cell:hover { transform: scale(1.02); box-shadow: 0 4px 20px rgba(0,0,0,0.6), 0 0 0 2px #667eea; }
    .grid-canvas { width: 100%; height: auto; display: block; }
    .cell-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 6px 8px;
      background: linear-gradient(transparent, rgba(0,0,0,0.75));
      font-size: 11px; color: #ccc;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Preview view */
    #preview-view {
      flex: 1; display: none; flex-direction: column; overflow: hidden;
    }
    #preview-nav {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px;
      background: #111; border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }
    .nav-btn {
      background: #2a2a2a; border: 1px solid #333; color: #ccc;
      padding: 5px 12px; border-radius: 6px; cursor: pointer;
      font-size: 12px; font-weight: 500; white-space: nowrap;
      transition: background 0.15s;
    }
    .nav-btn:hover:not(:disabled) { background: #333; }
    .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    #preview-filename {
      flex: 1; font-size: 13px; color: #aaa;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #preview-counter { font-size: 12px; color: #666; white-space: nowrap; }
    #preview-canvas-wrap {
      flex: 1; overflow: auto; display: flex;
      align-items: flex-start; justify-content: center;
      padding: 20px;
    }
    #MainCanvas { max-width: 100%; border-radius: 6px; box-shadow: 0 8px 40px rgba(0,0,0,0.7); }

    @media (max-width: 720px) {
      body { flex-direction: column; height: auto; overflow: auto; }
      #sidebar { width: 100%; min-width: unset; }
      #mainpanel { min-height: 60vw; }
    }
  </style>
</head>
<body>

<!-- ─── SIDEBAR ──────────────────────────────────────────── -->
<div id="sidebar">
  <h1>Watermarker</h1>

  <div id="dropzone" onclick="document.getElementById('wmimg').click()">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:6px">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <path d="M21 15l-5-5L5 21"/>
    </svg>
    <p>Clicca o trascina le immagini</p>
    <p class="hint">JPG · PNG · WEBP · più file contemporaneamente</p>
  </div>
  <input type="file" id="wmimg" accept="image/*" multiple>

  <div class="section" id="filelist-section">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div class="section-title" id="filelist-count">0 immagini</div>
      <span style="font-size:11px;color:#555;cursor:pointer;" onclick="clearAll()">Rimuovi tutto</span>
    </div>
    <div id="filelist"></div>
  </div>

  <div class="section">
    <div class="section-title">Testo filigrana</div>
    <div>
      <label for="wmline1">Linea 1</label>
      <input type="text" id="wmline1" placeholder="2024-01-15 · COPIA PER XYZ srl">
    </div>
    <div>
      <label for="wmline2">Linea 2</label>
      <input type="text" id="wmline2" placeholder="ACQUISTO PRODOTTO ABC">
    </div>
    <div>
      <label for="wmline3">Linea 3</label>
      <input type="text" id="wmline3" placeholder="">
    </div>
  </div>

  <div class="section">
    <div class="section-title">Stile</div>
    <div>
      <label for="wmfont">Font</label>
      <select id="wmfont">
        <option value="sans-serif">Sans-serif</option>
        <option value="serif">Serif</option>
        <option value="monospace">Monospace</option>
        <option value="'Arial Black', sans-serif">Arial Black</option>
      </select>
    </div>
    <div>
      <label>Dimensione testo <span style="color:#555;font-size:10px">% della diagonale</span></label>
      <div class="range-row">
        <input type="range" id="wmsize" min="0.5" max="12" step="0.1" value="4">
        <span class="range-val" id="wmsizeval">4.0%</span>
      </div>
    </div>
    <div>
      <label>Colore</label>
      <div class="color-row">
        <input type="color" id="wmcolor" value="#000000">
        <span class="color-label">Colore testo filigrana</span>
      </div>
    </div>
    <div>
      <label>Opacità</label>
      <div class="range-row">
        <input type="range" id="wmalpha" min="3" max="80" value="25">
        <span class="range-val" id="wmalphaval">25%</span>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Disposizione</div>
    <div>
      <label>Rotazione</label>
      <div class="range-row">
        <input type="range" id="wmrotation" min="-90" max="0" value="-30">
        <span class="range-val" id="wmrotationval">-30°</span>
      </div>
    </div>
    <div>
      <label>Spaziatura orizzontale <span style="color:#555;font-size:10px">% larghezza</span></label>
      <div class="range-row">
        <input type="range" id="wmspacingx" min="5" max="120" step="1" value="30">
        <span class="range-val" id="wmspacingxval">30%</span>
      </div>
    </div>
    <div>
      <label>Spaziatura verticale <span style="color:#555;font-size:10px">% altezza</span></label>
      <div class="range-row">
        <input type="range" id="wmspacingy" min="0" max="60" step="1" value="10">
        <span class="range-val" id="wmspacingyval">10%</span>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Scarica selezionato</div>
    <div class="btn-row">
      <button class="btn btn-secondary" id="dlpng" onclick="downloadSingle('png')" disabled>PNG</button>
      <button class="btn btn-secondary" id="dljpg" onclick="downloadSingle('jpg')" disabled>JPG</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Scarica tutti</div>
    <div class="btn-row">
      <button class="btn btn-primary" id="dlzippng" onclick="downloadZip('png')" disabled>ZIP PNG</button>
      <button class="btn btn-primary" id="dlzipjpg" onclick="downloadZip('jpg')" disabled>ZIP JPG</button>
    </div>
    <div id="zip-progress">
      <div id="zip-bar-wrap"><div id="zip-bar"></div></div>
      <div id="zip-label"></div>
    </div>
  </div>
</div>

<!-- ─── MAIN PANEL ───────────────────────────────────────── -->
<div id="mainpanel">

  <div id="placeholder">
    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.8">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <path d="M21 15l-5-5L5 21"/>
    </svg>
    <p>Carica una o più immagini per iniziare</p>
  </div>

  <!-- Grid view -->
  <div id="grid-view">
    <div id="grid"></div>
  </div>

  <!-- Preview view -->
  <div id="preview-view">
    <div id="preview-nav">
      <button class="nav-btn" onclick="showGridView()">← Griglia</button>
      <span id="preview-filename"></span>
      <span id="preview-counter"></span>
      <button class="nav-btn" id="btn-prev" onclick="navigatePreview(-1)">‹ Prec</button>
      <button class="nav-btn" id="btn-next" onclick="navigatePreview(1)">Succ ›</button>
    </div>
    <div id="preview-canvas-wrap">
      <canvas id="MainCanvas"></canvas>
    </div>
  </div>

</div>

<script>
const files = [];       // [{file, name, img, thumbCanvas, thumbCtx}]
let mode = 'empty';     // 'empty' | 'grid' | 'preview'
let previewIdx = -1;
let thumbTimer = null;

// ── File loading ───────────────────────────────────────────
const dropzone = document.getElementById('dropzone');
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag-over');
  [...e.dataTransfer.files].filter(f => f.type.startsWith('image/')).forEach(loadFile);
});
document.getElementById('wmimg').addEventListener('change', e => {
  [...e.target.files].forEach(loadFile);
  e.target.value = '';
});

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const thumbCanvas = document.createElement('canvas');
      files.push({ file, name: file.name, img, thumbCanvas, thumbCtx: thumbCanvas.getContext('2d') });
      updateSidebar();
      if (mode !== 'preview') showGridView();
      else addThumbToGrid(files.length - 1);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ── Sidebar ────────────────────────────────────────────────
function updateSidebar() {
  const section  = document.getElementById('filelist-section');
  const countEl  = document.getElementById('filelist-count');
  const listEl   = document.getElementById('filelist');

  section.style.display = files.length ? '' : 'none';
  countEl.textContent   = files.length === 1 ? '1 immagine' : `${files.length} immagini`;

  dropzone.classList.toggle('compact', files.length > 0);
  dropzone.innerHTML = files.length > 0
    ? `<p style="color:#888;font-size:12px;">+ Aggiungi altre immagini</p>`
    : `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:6px">
         <rect x="3" y="3" width="18" height="18" rx="2"/>
         <circle cx="8.5" cy="8.5" r="1.5"/>
         <path d="M21 15l-5-5L5 21"/>
       </svg>
       <p>Clicca o trascina le immagini</p>
       <p class="hint">JPG · PNG · WEBP · più file contemporaneamente</p>`;

  listEl.innerHTML = '';
  files.forEach((entry, i) => {
    const item   = document.createElement('div');
    item.className = 'file-item' + (i === previewIdx && mode === 'preview' ? ' selected' : '');

    const thumb  = document.createElement('img');
    thumb.className = 'file-thumb';
    thumb.src    = entry.img.src;

    const info   = document.createElement('div');
    info.className = 'file-info';
    info.innerHTML = `<div class="file-name" title="${entry.name}">${entry.name}</div>
                      <div class="file-size">${entry.img.naturalWidth}×${entry.img.naturalHeight}</div>`;

    const rm     = document.createElement('span');
    rm.className = 'file-remove';
    rm.textContent = '×';
    rm.onclick   = e => { e.stopPropagation(); removeFile(i); };

    item.appendChild(thumb);
    item.appendChild(info);
    item.appendChild(rm);
    item.onclick = () => openPreview(i);
    listEl.appendChild(item);
  });

  const hasSel = mode === 'preview' && previewIdx >= 0;
  document.getElementById('dlpng').disabled    = !hasSel;
  document.getElementById('dljpg').disabled    = !hasSel;
  document.getElementById('dlzippng').disabled = files.length === 0;
  document.getElementById('dlzipjpg').disabled = files.length === 0;
}

function removeFile(idx) {
  files.splice(idx, 1);
  if (files.length === 0) { clearAll(); return; }
  if (previewIdx >= files.length) previewIdx = files.length - 1;
  if (mode === 'preview') openPreview(previewIdx);
  else showGridView();
  updateSidebar();
}

function clearAll() {
  files.length = 0;
  previewIdx   = -1;
  mode         = 'empty';
  setView('empty');
  updateSidebar();
}

// ── Views ──────────────────────────────────────────────────
function setView(v) {
  document.getElementById('placeholder').style.display  = v === 'empty'   ? 'flex' : 'none';
  document.getElementById('grid-view').style.display    = v === 'grid'    ? 'block' : 'none';
  document.getElementById('preview-view').style.display = v === 'preview' ? 'flex'  : 'none';
}

function showGridView() {
  mode       = 'grid';
  previewIdx = -1;
  setView('grid');
  buildGrid();
  updateSidebar();
}

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  files.forEach((entry, i) => {
    const cell   = document.createElement('div');
    cell.className = 'grid-cell';
    cell.dataset.idx = i;
    cell.onclick = () => openPreview(i);

    entry.thumbCanvas.className = 'grid-canvas';
    const label  = document.createElement('div');
    label.className = 'cell-label';
    label.textContent = entry.name;

    cell.appendChild(entry.thumbCanvas);
    cell.appendChild(label);
    grid.appendChild(cell);
  });
  redrawAllThumbs();
}

function addThumbToGrid(i) {
  // Called when a new file is added while already in grid mode
  const entry  = files[i];
  const grid   = document.getElementById('grid');
  const cell   = document.createElement('div');
  cell.className = 'grid-cell';
  cell.dataset.idx = i;
  cell.onclick = () => openPreview(i);

  entry.thumbCanvas.className = 'grid-canvas';
  const label  = document.createElement('div');
  label.className = 'cell-label';
  label.textContent = entry.name;

  cell.appendChild(entry.thumbCanvas);
  cell.appendChild(label);
  grid.appendChild(cell);
  drawThumb(entry);
}

function openPreview(idx) {
  mode       = 'preview';
  previewIdx = idx;
  setView('preview');

  const entry = files[idx];
  document.getElementById('preview-filename').textContent = entry.name;
  document.getElementById('preview-counter').textContent  = `${idx + 1} / ${files.length}`;
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === files.length - 1;

  const canvas = document.getElementById('MainCanvas');
  const ctx    = canvas.getContext('2d');
  applyWatermarkToCanvas(entry.img, canvas, ctx, 1);
  updateSidebar();
}

function navigatePreview(delta) {
  const next = previewIdx + delta;
  if (next >= 0 && next < files.length) openPreview(next);
}

// ── Watermark core ─────────────────────────────────────────
function getParams() {
  return {
    lines:     ['wmline1','wmline2','wmline3'].map(id => document.getElementById(id).value).filter(l => l.trim()),
    sizePct:   Number(document.getElementById('wmsize').value),
    alpha:     Number(document.getElementById('wmalpha').value) / 100,
    rotation:  Number(document.getElementById('wmrotation').value) * Math.PI / 180,
    spacingXPct: Number(document.getElementById('wmspacingx').value),
    spacingYPct: Number(document.getElementById('wmspacingy').value),
    font:      document.getElementById('wmfont').value,
    color:     document.getElementById('wmcolor').value,
  };
}

// scale: canvas_size / natural_size (1 for full-res, <1 for thumbs)
function applyWatermarkToCanvas(srcImg, canvas, ctx, scale) {
  const W = canvas.width  = Math.round(srcImg.naturalWidth  * scale);
  const H = canvas.height = Math.round(srcImg.naturalHeight * scale);
  ctx.drawImage(srcImg, 0, 0, W, H);

  const p = getParams();
  if (!p.lines.length) return;

  const dim      = Math.sqrt(W * W + H * H);   // diagonal — same reference for all ratios
  const size     = (p.sizePct     / 100) * dim;
  const spacingX = (p.spacingXPct / 100) * W;
  const spacingY = (p.spacingYPct / 100) * H;

  ctx.save();
  ctx.globalAlpha  = p.alpha;
  ctx.font         = `bold ${size}px ${p.font}`;
  ctx.fillStyle    = p.color;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';

  const lineHeight  = size * 1.4;
  const blockHeight = p.lines.length * lineHeight;

  ctx.translate(W / 2, H / 2);
  ctx.rotate(p.rotation);

  const cols = Math.ceil(dim / spacingX) + 2;
  const rows = Math.ceil(dim / (blockHeight + spacingY)) + 2;

  for (let row = -rows; row <= rows; row++) {
    for (let col = -cols; col <= cols; col++) {
      const x = col * spacingX;
      const y = row * (blockHeight + spacingY);
      p.lines.forEach((line, i) => ctx.fillText(line, x, y + i * lineHeight));
    }
  }
  ctx.restore();
}

function drawThumb(entry) {
  const MAX   = 450;
  const scale = Math.min(1, MAX / Math.max(entry.img.naturalWidth, entry.img.naturalHeight));
  applyWatermarkToCanvas(entry.img, entry.thumbCanvas, entry.thumbCtx, scale);
}

function redrawAllThumbs() {
  files.forEach(drawThumb);
}

// ── Settings change ────────────────────────────────────────
document.querySelectorAll('input, select').forEach(el => {
  el.addEventListener('input', () => {
    syncLabels();
    if (mode === 'preview') {
      const canvas = document.getElementById('MainCanvas');
      applyWatermarkToCanvas(files[previewIdx].img, canvas, canvas.getContext('2d'), 1);
    }
    clearTimeout(thumbTimer);
    thumbTimer = setTimeout(redrawAllThumbs, 120);
  });
});

function syncLabels() {
  document.getElementById('wmsizeval').textContent    = parseFloat(document.getElementById('wmsize').value).toFixed(1) + '%';
  document.getElementById('wmalphaval').textContent   = document.getElementById('wmalpha').value + '%';
  document.getElementById('wmrotationval').textContent = document.getElementById('wmrotation').value + '°';
  document.getElementById('wmspacingxval').textContent = document.getElementById('wmspacingx').value + '%';
  document.getElementById('wmspacingyval').textContent = document.getElementById('wmspacingy').value + '%';
}

// ── Download ───────────────────────────────────────────────
function downloadSingle(format) {
  if (previewIdx < 0) return;
  const canvas = document.getElementById('MainCanvas');
  const stem   = files[previewIdx].name.replace(/\.[^.]+$/, '');
  const link   = document.createElement('a');
  link.download = stem + '_watermark.' + (format === 'png' ? 'png' : 'jpg');
  link.href     = format === 'png' ? canvas.toDataURL('image/png') : canvas.toDataURL('image/jpeg', 0.95);
  link.click();
}

async function downloadZip(format) {
  if (!files.length) return;
  const btnPng = document.getElementById('dlzippng');
  const btnJpg = document.getElementById('dlzipjpg');
  const prog   = document.getElementById('zip-progress');
  const bar    = document.getElementById('zip-bar');
  const lbl    = document.getElementById('zip-label');

  btnPng.disabled = btnJpg.disabled = true;
  prog.style.display = '';

  const zip    = new JSZip();
  const canvas = document.createElement('canvas');
  const ctx    = canvas.getContext('2d');
  const ext    = format === 'png' ? 'png' : 'jpg';
  const mime   = format === 'png' ? 'image/png' : 'image/jpeg';

  for (let i = 0; i < files.length; i++) {
    lbl.textContent  = `Elaborazione ${i + 1} / ${files.length}: ${files[i].name}`;
    bar.style.width  = (i / files.length * 100) + '%';
    await new Promise(r => setTimeout(r, 0));

    applyWatermarkToCanvas(files[i].img, canvas, ctx, 1);
    const b64  = (format === 'png' ? canvas.toDataURL('image/png') : canvas.toDataURL('image/jpeg', 0.95)).split(',')[1];
    const stem = files[i].name.replace(/\.[^.]+$/, '');
    zip.file(`${stem}_watermark.${ext}`, b64, { base64: true });
  }

  bar.style.width = '100%';
  lbl.textContent = 'Creazione ZIP…';
  const blob = await zip.generateAsync({ type: 'blob' }, m => { bar.style.width = m.percent.toFixed(0) + '%'; });

  const url  = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.download = `watermarked_${files.length}_files.zip`;
  link.href     = url;
  link.click();
  URL.revokeObjectURL(url);

  prog.style.display  = 'none';
  bar.style.width     = '0%';
  btnPng.disabled = btnJpg.disabled = false;
}

syncLabels();
</script>
