<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watermarker</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <div style="display: flex; align-items: center; justify-content: space-between;">
      <h1>Watermarker</h1>
      <button id="theme-toggle" class="theme-btn" title="Toggle light/dark">
        <span class="theme-icon">🌙</span>
      </button>
    </div>
  </div>

  <div id="dropzone" onclick="document.getElementById('wmimg').click()">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:6px">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <path d="M21 15l-5-5L5 21"/>
    </svg>
    <p>Clicca o trascina le immagini</p>
    <p class="hint">JPG · PNG · WEBP · più file contemporaneamente</p>
  </div>
  <input type="file" id="wmimg" accept="image/*" multiple>

  <div class="section" id="filelist-section">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div class="section-title" id="filelist-count">0 immagini</div>
      <span class="link-btn" onclick="clearAll()">Rimuovi tutto</span>
    </div>
    <div id="filelist"></div>
  </div>

  <div class="section">
    <div class="section-title">Testo filigrana</div>
    <div>
      <label for="wmline1">Linea 1</label>
      <input type="text" id="wmline1" placeholder="2024-01-15 · COPIA PER XYZ srl">
    </div>
    <div>
      <label for="wmline2">Linea 2</label>
      <input type="text" id="wmline2" placeholder="ACQUISTO PRODOTTO ABC">
    </div>
    <div>
      <label for="wmline3">Linea 3</label>
      <input type="text" id="wmline3" placeholder="">
    </div>
  </div>

  <div class="section">
    <div class="section-title">Stile</div>
    <div>
      <label for="wmfont">Font</label>
      <select id="wmfont">
        <option value="sans-serif">Sans-serif</option>
        <option value="serif">Serif</option>
        <option value="monospace">Monospace</option>
        <option value="'Arial Black', sans-serif">Arial Black</option>
      </select>
    </div>
    <div>
      <label>Dimensione testo <span class="unit-hint">% della diagonale</span></label>
      <div class="range-row">
        <input type="range" id="wmsize" min="0.5" max="12" step="0.1" value="4">
        <span class="range-val" id="wmsizeval">4.0%</span>
      </div>
    </div>
    <div>
      <label>Colore</label>
      <div class="color-row">
        <input type="color" id="wmcolor" value="#000000">
        <span class="color-label">Colore testo filigrana</span>
      </div>
    </div>
    <div>
      <label>Opacità</label>
      <div class="range-row">
        <input type="range" id="wmalpha" min="3" max="80" value="25">
        <span class="range-val" id="wmalphaval">25%</span>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Disposizione</div>
    <div>
      <label>Rotazione</label>
      <div class="range-row">
        <input type="range" id="wmrotation" min="-90" max="0" value="-30">
        <span class="range-val" id="wmrotationval">-30°</span>
      </div>
    </div>
    <div>
      <label>Spaziatura orizzontale <span class="unit-hint">% larghezza</span></label>
      <div class="range-row">
        <input type="range" id="wmspacingx" min="5" max="120" step="1" value="30">
        <span class="range-val" id="wmspacingxval">30%</span>
      </div>
    </div>
    <div>
      <label>Spaziatura verticale <span class="unit-hint">% altezza</span></label>
      <div class="range-row">
        <input type="range" id="wmspacingy" min="0" max="60" step="1" value="10">
        <span class="range-val" id="wmspacingyval">10%</span>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Scarica selezionato</div>
    <div class="btn-row">
      <button class="btn btn-secondary" id="dlpng" onclick="downloadSingle('png')" disabled>PNG</button>
      <button class="btn btn-secondary" id="dljpg" onclick="downloadSingle('jpg')" disabled>JPG</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Scarica tutti</div>
    <div class="btn-row">
      <button class="btn btn-primary" id="dlzippng" onclick="downloadZip('png')" disabled>ZIP PNG</button>
      <button class="btn btn-primary" id="dlzipjpg" onclick="downloadZip('jpg')" disabled>ZIP JPG</button>
    </div>
    <div id="zip-progress">
      <div id="zip-bar-wrap"><div id="zip-bar"></div></div>
      <div id="zip-label"></div>
    </div>
  </div>
</div>

<div id="mainpanel">
  <div id="placeholder">
    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.8">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <path d="M21 15l-5-5L5 21"/>
    </svg>
    <p>Carica una o più immagini per iniziare</p>
  </div>

  <div id="grid-view">
    <div id="grid"></div>
  </div>

  <div id="preview-view">
    <div id="preview-nav">
      <button class="nav-btn" onclick="showGridView()">← Griglia</button>
      <span id="preview-filename"></span>
      <span id="preview-counter"></span>
      <button class="nav-btn" id="btn-prev" onclick="navigatePreview(-1)">‹ Prec</button>
      <button class="nav-btn" id="btn-next" onclick="navigatePreview(1)">Succ ›</button>
    </div>
    <div id="preview-canvas-wrap">
      <canvas id="MainCanvas"></canvas>
    </div>
  </div>
</div>

<script type="module" src="./main.js"></script>
</body>
</html>
