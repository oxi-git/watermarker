name: Build & Release

on:
  push:
    branches: [main]       # CI normale: solo artifact temporanei
    tags: ['v*']           # Release: pubblica su GitHub Releases
  workflow_dispatch:

# Permesso per creare release e caricare asset
permissions:
  contents: write

jobs:
  # ── macOS: produce .dmg universale (Intel + Apple Silicon) ──
  build-macos:
    name: macOS (.dmg universale)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Installa dipendenze
        run: npm ci

      - name: Aggiorna versione da tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json

      - name: Genera icone da SVG
        run: |
          mkdir -p src-tauri/icons
          cp watermarker-logo.svg src-tauri/icons/icon.svg
          npx tauri icon src-tauri/icons/icon.svg

      - name: Build app (universal — Intel + Apple Silicon)
        run: npx tauri build --target universal-apple-darwin --bundles dmg

      - name: Upload artifact (CI)
        uses: actions/upload-artifact@v4
        with:
          name: watermarker-macos
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          retention-days: 7

      - name: Pubblica su Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

  # ── Linux: produce AppImage e .deb ────────────────────────
  build-linux:
    name: Linux (AppImage + .deb)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Dipendenze sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Installa dipendenze
        run: npm ci

      - name: Aggiorna versione da tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json

      - name: Genera icone da SVG
        run: |
          mkdir -p src-tauri/icons
          cp watermarker-logo.svg src-tauri/icons/icon.svg
          npx tauri icon src-tauri/icons/icon.svg

      - name: Build app
        run: npx tauri build --bundles appimage,deb

      - name: Upload artifact (CI)
        uses: actions/upload-artifact@v4
        with:
          name: watermarker-linux
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          retention-days: 7

      - name: Pubblica su Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb

  # ── Windows: produce .msi e installer .exe ────────────────
  build-windows:
    name: Windows (.msi + .exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Installa dipendenze
        run: npm ci

      - name: Aggiorna versione da tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json

      - name: Prepara icone da SVG
        run: |
          mkdir -p src-tauri/icons
          copy watermarker-logo.svg src-tauri/icons/icon.svg

      - name: Genera icone Tauri
        run: npx tauri icon src-tauri/icons/icon.svg

      - name: Build app
        run: npx tauri build --bundles msi,nsis

      - name: Upload artifact (CI)
        uses: actions/upload-artifact@v4
        with:
          name: watermarker-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 7

      - name: Pubblica su Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
