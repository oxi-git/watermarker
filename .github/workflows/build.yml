name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:   # avvio manuale da GitHub UI

jobs:
  # ── macOS: produce .app e .dmg ────────────────────────────
  build-macos:
    name: macOS (.app + .dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Installa dipendenze
        run: npm ci

      - name: Genera icone placeholder
        run: |
          mkdir -p src-tauri/icons
          python3 - <<'PYEOF'
          import struct, zlib
          def make_png(w, h, r, g, b):
              row  = b'\x00' + bytes([r, g, b]) * w
              raw  = row * h
              idat = zlib.compress(raw, 9)
              def chunk(tag, data):
                  body = tag + data
                  return struct.pack('>I', len(data)) + body + struct.pack('>I', zlib.crc32(body) & 0xffffffff)
              ihdr = struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)
              return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', ihdr) + chunk(b'IDAT', idat) + chunk(b'IEND', b'')
          with open('src-tauri/icons/icon.png', 'wb') as f:
              f.write(make_png(512, 512, 102, 126, 234))
          PYEOF
          npx tauri icon src-tauri/icons/icon.png

      - name: Build app (universal — Intel + Apple Silicon)
        run: npx tauri build --target universal-apple-darwin --bundles app,dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: watermarker-macos
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/Watermarker.app
          retention-days: 14

  # ── Linux: produce AppImage e .deb ────────────────────────
  build-linux:
    name: Linux (AppImage + .deb)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Dipendenze sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Installa dipendenze
        run: npm ci

      - name: Genera icone placeholder
        run: |
          mkdir -p src-tauri/icons
          python3 - <<'PYEOF'
          import struct, zlib
          def make_png(w, h, r, g, b):
              row  = b'\x00' + bytes([r, g, b]) * w
              raw  = row * h
              idat = zlib.compress(raw, 9)
              def chunk(tag, data):
                  body = tag + data
                  return struct.pack('>I', len(data)) + body + struct.pack('>I', zlib.crc32(body) & 0xffffffff)
              ihdr = struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)
              return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', ihdr) + chunk(b'IDAT', idat) + chunk(b'IEND', b'')
          with open('src-tauri/icons/icon.png', 'wb') as f:
              f.write(make_png(512, 512, 102, 126, 234))
          PYEOF
          npx tauri icon src-tauri/icons/icon.png

      - name: Build app
        run: npx tauri build --bundles appimage,deb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: watermarker-linux
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          retention-days: 14

  # ── Windows: produce .msi e installer .exe ────────────────
  build-windows:
    name: Windows (.msi + .exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Installa dipendenze
        run: npm ci

      - name: Genera icone placeholder
        shell: python
        run: |
          import struct, zlib, os
          os.makedirs('src-tauri/icons', exist_ok=True)
          def make_png(w, h, r, g, b):
              row  = b'\x00' + bytes([r, g, b]) * w
              raw  = row * h
              idat = zlib.compress(raw, 9)
              def chunk(tag, data):
                  body = tag + data
                  return struct.pack('>I', len(data)) + body + struct.pack('>I', zlib.crc32(body) & 0xffffffff)
              ihdr = struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)
              return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', ihdr) + chunk(b'IDAT', idat) + chunk(b'IEND', b'')
          with open('src-tauri/icons/icon.png', 'wb') as f:
              f.write(make_png(512, 512, 102, 126, 234))

      - name: Genera icone Tauri
        run: npx tauri icon src-tauri/icons/icon.png

      - name: Build app
        run: npx tauri build --bundles msi,nsis

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: watermarker-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 14
